<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  /* Reset and center everything on the page */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1e1e2f;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #f0f0f0;
  }

  h1 {
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  #scoreboard {
    font-size: 1.2rem;
    margin-bottom: 10px;
  }

  /* Wrapper positions the game-over overlay directly on top of the canvas */
  #game-wrapper {
    position: relative;
  }

  canvas {
    background: #14141f;
    border: 4px solid #4caf50;
    border-radius: 6px;
    display: block;
  }

  /* Game-over overlay is hidden until the game ends */
  #game-over-screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.75);
    border-radius: 6px;
  }

  #game-over-screen h2 {
    font-size: 2rem;
    color: #ff5252;
    margin-bottom: 10px;
  }

  #final-score {
    font-size: 1.2rem;
    margin-bottom: 20px;
  }

  #restart-btn {
    padding: 10px 24px;
    font-size: 1rem;
    background: #4caf50;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  #restart-btn:hover {
    background: #43a047;
  }

  #instructions {
    margin-top: 12px;
    font-size: 0.9rem;
    color: #aaa;
  }
</style>
</head>
<body>

  <h1>nogupeli</h1>
  <div id="scoreboard">Score: <span id="score">0</span></div>

  <div id="game-wrapper">
    <canvas id="game-canvas" width="400" height="400"></canvas>

    <!-- Overlay shown when the game ends -->
    <div id="game-over-screen">
      <h2>Game Over</h2>
      <div id="final-score">Score: 0</div>
      <button id="restart-btn">Restart</button>
    </div>
  </div>

  <div id="instructions">Use W A S D to move</div>

  <script>
    // ---- Configuration ----
    const GRID_SIZE = 20;           // size of each cell in pixels
    const TILE_COUNT = 20;          // number of cells per row/column (400 / 20)
    const MOVE_INTERVAL_MS = 120;   // time between logical moves (controls game speed)
    // Rendering itself runs every animation frame (~60 fps). The snake's
    // position is interpolated between moves so motion looks smooth instead
    // of jumping one whole cell at a time.

    // The drink that appears next is picked at random from this list each
    // time food is placed.
    const FOOD_TYPES = ['beer', 'wine', 'cocktail'];

    // ---- DOM references ----
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreEl = document.getElementById('final-score');
    const restartBtn = document.getElementById('restart-btn');

    // ---- Game state ----
    // prevSnake holds the snake's cells from before the last move; it is used
    // to interpolate positions while rendering. lastMoveTime marks when the
    // most recent logical move happened, and rafId is the animation-frame handle.
    // directionQueue buffers up to two upcoming turns so quick, successive
    // key presses (e.g. tapping a corner) all register instead of the
    // earlier one being overwritten before the next move is applied.
    const MAX_QUEUED_DIRECTIONS = 2;
    let snake, prevSnake, direction, directionQueue, food, score,
        isGameOver, lastMoveTime, rafId;

    // Sets (or resets) all game state to start a fresh game
    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      prevSnake = snake.map(s => ({ x: s.x, y: s.y }));
      direction = { x: 1, y: 0 };
      directionQueue = [];
      score = 0;
      isGameOver = false;

      scoreEl.textContent = score;
      gameOverScreen.style.display = 'none';

      placeFood();

      // Start the render loop fresh.
      if (rafId) cancelAnimationFrame(rafId);
      lastMoveTime = performance.now();
      rafId = requestAnimationFrame(loop);
    }

    // Places food at a random cell that isn't currently occupied by the
    // snake, and picks which drink it will be. The outermost ring of cells
    // is avoided so the (now double-sized) food art never gets clipped by
    // the canvas edge.
    function placeFood() {
      let position;
      do {
        position = {
          x: 1 + Math.floor(Math.random() * (TILE_COUNT - 2)),
          y: 1 + Math.floor(Math.random() * (TILE_COUNT - 2))
        };
      } while (snake.some(segment => segment.x === position.x && segment.y === position.y));

      position.type = FOOD_TYPES[Math.floor(Math.random() * FOOD_TYPES.length)];
      food = position;
    }

    // The main render loop. Runs on every animation frame (~60 fps): it
    // advances the game logic whenever enough time has elapsed and always
    // redraws using an interpolated position for smooth motion.
    function loop(timestamp) {
      if (isGameOver) return;

      const elapsed = timestamp - lastMoveTime;
      if (elapsed >= MOVE_INTERVAL_MS) {
        // Keep the leftover time so moves stay evenly spaced.
        lastMoveTime = timestamp - (elapsed % MOVE_INTERVAL_MS);
        step();
        if (isGameOver) {
          draw(1); // draw the final resting position
          return;
        }
      }

      // How far we are (0..1) between the previous move and the next one.
      const alpha = Math.min((timestamp - lastMoveTime) / MOVE_INTERVAL_MS, 1);
      draw(alpha);
      rafId = requestAnimationFrame(loop);
    }

    // Advances the game by one logical step: moves the snake, checks
    // collisions, and handles eating food.
    function step() {
      if (directionQueue.length > 0) {
        direction = directionQueue.shift();
      }

      // Remember where every segment was so we can interpolate toward the new spot.
      prevSnake = snake.map(s => ({ x: s.x, y: s.y }));

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      // Wall collision
      if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
        return endGame();
      }

      // Self collision
      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        return endGame();
      }

      snake.unshift(head);

      // Did the snake eat the food?
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        placeFood();
      } else {
        snake.pop(); // remove tail if no food was eaten (keeps length constant)
      }
    }

    // Renders the snake and food. `alpha` (0..1) is how far the snake has
    // progressed toward its next cell, used to interpolate for smooth motion.
    function draw(alpha) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawFood();

      // Draw snake (head gets a rounded smiley face), interpolating each
      // segment between its previous cell and its current one.
      snake.forEach((segment, index) => {
        const from = prevSnake[index] || segment; // new tail segment has no prior spot
        const x = from.x + (segment.x - from.x) * alpha;
        const y = from.y + (segment.y - from.y) * alpha;

        if (index === 0) {
          drawHead(x, y);
        } else {
          ctx.fillStyle = '#4caf50';
          ctx.fillRect(x * GRID_SIZE, y * GRID_SIZE, GRID_SIZE - 1, GRID_SIZE - 1);
        }
      });
    }

    // Draws the current food item (one of three alcoholic drinks), centered
    // on its grid cell at double the original size.
    function drawFood() {
      const size = (GRID_SIZE - 1) * 2;
      const centerX = food.x * GRID_SIZE + GRID_SIZE / 2;
      const centerY = food.y * GRID_SIZE + GRID_SIZE / 2;
      const px = centerX - size / 2;
      const py = centerY - size / 2;

      switch (food.type) {
        case 'wine':     drawWineGlass(px, py, size); break;
        case 'cocktail': drawCocktailGlass(px, py, size); break;
        case 'beer':
        default:         drawBeerMug(px, py, size); break;
      }
    }

    // A pint of beer: an amber glass with foam on top and a handle on the side.
    function drawBeerMug(px, py, size) {
      const glassLeft = px + size * 0.22;
      const glassRight = px + size * 0.68;
      const glassTop = py + size * 0.38;
      const glassBottom = py + size * 0.88;
      const glassWidth = glassRight - glassLeft;

      // Handle, drawn first so the glass overlaps its inner edge
      const handleCenterX = glassRight;
      const handleCenterY = (glassTop + glassBottom) / 2;
      const handleRadius = (glassBottom - glassTop) * 0.32;

      ctx.strokeStyle = '#d99a2b';
      ctx.lineWidth = Math.max(1, size * 0.14);
      ctx.beginPath();
      ctx.arc(handleCenterX, handleCenterY, handleRadius, -Math.PI / 2.2, Math.PI / 2.2);
      ctx.stroke();

      // Glass body (amber beer)
      ctx.fillStyle = '#e8a52e';
      ctx.fillRect(glassLeft, glassTop, glassWidth, glassBottom - glassTop);

      // Glass outline
      ctx.strokeStyle = '#fdf6e3';
      ctx.lineWidth = 1;
      ctx.strokeRect(glassLeft, glassTop, glassWidth, glassBottom - glassTop);

      // Foam on top
      ctx.fillStyle = '#fffbea';
      ctx.beginPath();
      ctx.ellipse(glassLeft + glassWidth / 2, glassTop, glassWidth / 2, size * 0.14, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // A glass of red wine: a curved bowl of wine on a thin stem and base.
    function drawWineGlass(px, py, size) {
      const centerX = px + size / 2;
      const bowlTop = py + size * 0.16;
      const bowlBottom = py + size * 0.52;
      const bowlWidth = size * 0.5;
      const stemBottom = py + size * 0.84;
      const baseY = py + size * 0.9;
      const baseWidth = size * 0.34;

      // Wine-filled bowl
      ctx.fillStyle = '#7b1e3a';
      ctx.beginPath();
      ctx.moveTo(centerX - bowlWidth / 2, bowlTop);
      ctx.quadraticCurveTo(centerX - bowlWidth / 2, bowlBottom, centerX, bowlBottom + size * 0.04);
      ctx.quadraticCurveTo(centerX + bowlWidth / 2, bowlBottom, centerX + bowlWidth / 2, bowlTop);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = '#f3e9e9';
      ctx.lineWidth = Math.max(1, size * 0.04);
      ctx.stroke();

      // Stem
      ctx.beginPath();
      ctx.moveTo(centerX, bowlBottom + size * 0.04);
      ctx.lineTo(centerX, stemBottom);
      ctx.stroke();

      // Base
      ctx.beginPath();
      ctx.ellipse(centerX, baseY, baseWidth / 2, size * 0.03, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    // A martini-style cocktail: a triangular glass with an olive garnish.
    function drawCocktailGlass(px, py, size) {
      const centerX = px + size / 2;
      const rimY = py + size * 0.2;
      const rimWidth = size * 0.56;
      const apexY = py + size * 0.5;
      const stemBottom = py + size * 0.82;
      const baseY = py + size * 0.9;
      const baseWidth = size * 0.32;

      // Cocktail (cone of liquid)
      ctx.fillStyle = '#c7e35c';
      ctx.beginPath();
      ctx.moveTo(centerX - rimWidth / 2, rimY);
      ctx.lineTo(centerX + rimWidth / 2, rimY);
      ctx.lineTo(centerX, apexY);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = '#f3f3f3';
      ctx.lineWidth = Math.max(1, size * 0.04);
      ctx.stroke();

      // Stem
      ctx.beginPath();
      ctx.moveTo(centerX, apexY);
      ctx.lineTo(centerX, stemBottom);
      ctx.stroke();

      // Base
      ctx.beginPath();
      ctx.ellipse(centerX, baseY, baseWidth / 2, size * 0.03, 0, 0, Math.PI * 2);
      ctx.stroke();

      // Olive garnish
      ctx.fillStyle = '#6b8e23';
      ctx.beginPath();
      ctx.arc(centerX + rimWidth * 0.18, rimY - size * 0.03, size * 0.07, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draws the snake's head as a rounded, smiling face oriented toward
    // whichever way the snake is currently moving.
    function drawHead(cellX, cellY) {
      const size = GRID_SIZE - 1;
      const centerX = cellX * GRID_SIZE + size / 2;
      const centerY = cellY * GRID_SIZE + size / 2;
      const radius = size / 2;

      // Rotation angle so the face always looks the way the snake is heading.
      const angle = Math.atan2(direction.y, direction.x);

      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(angle);

      // Rounded head
      ctx.fillStyle = '#81c784';
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.fill();

      // Eyes: two dots side by side (perpendicular to travel), set back
      // slightly from the front so the mouth has room ahead of them.
      const eyeOffsetX = radius * 0.05;
      const eyeOffsetY = radius * 0.5;
      const eyeRadius = radius * 0.2;

      ctx.fillStyle = '#1e1e2f';
      ctx.beginPath();
      ctx.arc(eyeOffsetX, -eyeOffsetY, eyeRadius, 0, Math.PI * 2);
      ctx.arc(eyeOffsetX, eyeOffsetY, eyeRadius, 0, Math.PI * 2);
      ctx.fill();

      // Smiling mouth: a small forward-facing curve, positioned ahead of
      // the eyes (near the nose) so it doesn't overlap them.
      ctx.strokeStyle = '#1e1e2f';
      ctx.lineWidth = Math.max(1, radius * 0.15);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(radius * 0.35, 0, radius * 0.4, -Math.PI / 4, Math.PI / 4);
      ctx.stroke();

      ctx.restore();
    }

    // Stops the game loop and shows the game-over overlay
    function endGame() {
      isGameOver = true;
      if (rafId) cancelAnimationFrame(rafId);
      finalScoreEl.textContent = `Score: ${score}`;
      gameOverScreen.style.display = 'flex';
    }

    // Handles WASD input. Each valid press is queued (rather than
    // overwriting a single pending direction) so rapid successive presses
    // all take effect, and each is validated against the last *queued*
    // direction so the snake can't be turned back on itself mid-buffer.
    document.addEventListener('keydown', (e) => {
      let newDirection;
      switch (e.key.toLowerCase()) {
        case 'w': newDirection = { x: 0, y: -1 }; break;
        case 's': newDirection = { x: 0, y: 1 };  break;
        case 'a': newDirection = { x: -1, y: 0 }; break;
        case 'd': newDirection = { x: 1, y: 0 };  break;
        default:
          return;
      }
      e.preventDefault(); // stop default browser behavior for these keys

      const reference = directionQueue.length > 0
        ? directionQueue[directionQueue.length - 1]
        : direction;

      // Ignore no-op repeats and 180-degree reversals.
      const isReversal = newDirection.x === -reference.x && newDirection.y === -reference.y;
      const isSameAsReference = newDirection.x === reference.x && newDirection.y === reference.y;

      if (!isReversal && !isSameAsReference && directionQueue.length < MAX_QUEUED_DIRECTIONS) {
        directionQueue.push(newDirection);
      }
    });

    restartBtn.addEventListener('click', initGame);

    // Kick off the first game
    initGame();
  </script>

</body>
</html>
