<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  /* Reset and center everything on the page */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1e1e2f;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #f0f0f0;
  }

  h1 {
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  #scoreboard {
    font-size: 1.2rem;
    margin-bottom: 10px;
  }

  /* Wrapper positions the game-over overlay directly on top of the canvas */
  #game-wrapper {
    position: relative;
  }

  canvas {
    background: #14141f;
    border: 4px solid #4caf50;
    border-radius: 6px;
    display: block;
  }

  /* Game-over overlay is hidden until the game ends */
  #game-over-screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.75);
    border-radius: 6px;
  }

  #game-over-screen h2 {
    font-size: 2rem;
    color: #ff5252;
    margin-bottom: 10px;
  }

  #final-score {
    font-size: 1.2rem;
    margin-bottom: 20px;
  }

  #restart-btn {
    padding: 10px 24px;
    font-size: 1rem;
    background: #4caf50;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  #restart-btn:hover {
    background: #43a047;
  }

  #instructions {
    margin-top: 12px;
    font-size: 0.9rem;
    color: #aaa;
  }
</style>
</head>
<body>

  <h1>Snake</h1>
  <div id="scoreboard">Score: <span id="score">0</span></div>

  <div id="game-wrapper">
    <canvas id="game-canvas" width="400" height="400"></canvas>

    <!-- Overlay shown when the game ends -->
    <div id="game-over-screen">
      <h2>Game Over</h2>
      <div id="final-score">Score: 0</div>
      <button id="restart-btn">Restart</button>
    </div>
  </div>

  <div id="instructions">Use the arrow keys to move</div>

  <script>
    // ---- Configuration ----
    const GRID_SIZE = 20;           // size of each cell in pixels
    const TILE_COUNT = 20;          // number of cells per row/column (400 / 20)
    const GAME_SPEED_MS = 120;      // milliseconds between game ticks

    // ---- DOM references ----
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreEl = document.getElementById('final-score');
    const restartBtn = document.getElementById('restart-btn');

    // ---- Game state ----
    let snake, direction, nextDirection, food, score, gameLoopId, isGameOver;

    // Sets (or resets) all game state to start a fresh game
    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      isGameOver = false;

      scoreEl.textContent = score;
      gameOverScreen.style.display = 'none';

      placeFood();

      if (gameLoopId) clearInterval(gameLoopId);
      gameLoopId = setInterval(tick, GAME_SPEED_MS);
    }

    // Places food at a random cell that isn't currently occupied by the snake
    function placeFood() {
      let position;
      do {
        position = {
          x: Math.floor(Math.random() * TILE_COUNT),
          y: Math.floor(Math.random() * TILE_COUNT)
        };
      } while (snake.some(segment => segment.x === position.x && segment.y === position.y));

      food = position;
    }

    // Runs one step of the game: move, check collisions, draw
    function tick() {
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      // Wall collision
      if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
        return endGame();
      }

      // Self collision
      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        return endGame();
      }

      snake.unshift(head);

      // Did the snake eat the food?
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        placeFood();
      } else {
        snake.pop(); // remove tail if no food was eaten (keeps length constant)
      }

      draw();
    }

    // Renders the snake and food onto the canvas
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw food
      ctx.fillStyle = '#ff5252';
      ctx.fillRect(food.x * GRID_SIZE, food.y * GRID_SIZE, GRID_SIZE - 1, GRID_SIZE - 1);

      // Draw snake (head in a brighter shade)
      snake.forEach((segment, index) => {
        ctx.fillStyle = index === 0 ? '#81c784' : '#4caf50';
        ctx.fillRect(segment.x * GRID_SIZE, segment.y * GRID_SIZE, GRID_SIZE - 1, GRID_SIZE - 1);
      });
    }

    // Stops the game loop and shows the game-over overlay
    function endGame() {
      isGameOver = true;
      clearInterval(gameLoopId);
      finalScoreEl.textContent = `Score: ${score}`;
      gameOverScreen.style.display = 'flex';
    }

    // Handles arrow-key input, preventing the snake from reversing on itself
    document.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'ArrowUp':
          if (direction.y === 0) nextDirection = { x: 0, y: -1 };
          break;
        case 'ArrowDown':
          if (direction.y === 0) nextDirection = { x: 0, y: 1 };
          break;
        case 'ArrowLeft':
          if (direction.x === 0) nextDirection = { x: -1, y: 0 };
          break;
        case 'ArrowRight':
          if (direction.x === 0) nextDirection = { x: 1, y: 0 };
          break;
        default:
          return;
      }
      e.preventDefault(); // stop page from scrolling with arrow keys
    });

    restartBtn.addEventListener('click', initGame);

    // Kick off the first game
    initGame();
  </script>

</body>
</html>
